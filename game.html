<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StockQuest Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body { margin:0; background:black; }
#login { position:absolute; top:10px; right:10px; z-index:10; }
button { padding:8px; }
</style>
</head>

<body>

<div id="login">
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_APP.firebaseapp.com",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

/* ================= GAME ================= */

class GameScene extends Phaser.Scene {

  preload() {
    this.load.image("player","assets/player.png");
    this.load.spritesheet("enemy","assets/enemy.png",{frameWidth:64,frameHeight:64});

    this.load.image("particle","assets/particle.png");
    this.load.image("fire","assets/fire.png");
    this.load.image("spark","assets/spark.png");
    this.load.image("portrait","assets/portrait.png");

    this.load.audio("bgm","assets/music_base.mp3");
    this.load.audio("bgm_ult","assets/music_ult.mp3");
    this.load.audio("hit","assets/hit.mp3");
    this.load.audio("voice","assets/voice_ult.mp3");
  }

  create() {
    this.state = { enemyHP:120, mana:0 };

    this.createAnimations();
    this.createCharacters();
    this.createUI();
    this.createVFX();

    this.bgm = this.sound.add("bgm",{loop:true,volume:0.5});
    this.bgm.play();
  }

  /* ========= ANIMATIONS ========= */

  createAnimations(){
    this.anims.create({ key:"idle", frames:this.anims.generateFrameNumbers("player",{start:0,end:3}), frameRate:6, repeat:-1 });
    this.anims.create({ key:"attack", frames:this.anims.generateFrameNumbers("player",{start:4,end:7}), frameRate:10 });

    this.anims.create({ key:"enemy_idle", frames:this.anims.generateFrameNumbers("enemy",{start:0,end:3}), frameRate:6, repeat:-1 });
    this.anims.create({
  key: "attack",
  frames: this.anims.generateFrameNumbers("player", { start: 0, end: 3 }),
  frameRate: 10
});;
  }

  createCharacters(){
    this.player = this.add.image(200,300,"player").setScale(0.1);
    this.enemy = this.add.sprite(600,300,"enemy").setScale(2);
  }

  /* ========= UI ========= */

  createUI(){
    this.enemyBar = this.add.rectangle(450,80,200,10,0xff4444);

    this.createBtn(650,500,"ATTACK",()=>this.attack());
    this.createBtn(780,500,"ULT",()=>this.ult());
  }

  createBtn(x,y,t,cb){
    const b=this.add.text(x,y,t,{backgroundColor:"#222",padding:10}).setInteractive();
    b.on("pointerdown",()=>{b.setScale(0.9);cb();});
    b.on("pointerup",()=>b.setScale(1));
  }

  /* ========= COMBAT ========= */

  attack(){
    this.player.play("attack");
    this.enemy.play("enemy_hit");

    this.hit(15);
    this.animeImpact(this.enemy.x,this.enemy.y);
  }

  ult(){
    if(this.state.mana<100) return;

    this.ultimateCutscene();
    this.hit(80);
  }

  hit(dmg){
    this.state.enemyHP -= dmg;
    this.state.mana += 20;

    this.sound.play("hit");

    if(this.state.enemyHP<=0){
      this.state.enemyHP=120;
    }

    this.enemyBar.width = 200*(this.state.enemyHP/120);
  }

  /* ========= VFX ========= */

  createVFX(){
    this.vfx = this.add.particles(0,0,"particle",{ speed:{min:-300,max:300}, scale:{start:0.6,end:0}, lifespan:400, blendMode:'ADD' });
  }

  animeImpact(x,y){
    this.vfx.explode(30,x,y);

    const flash = this.add.circle(x,y,40,0xffffff,1);
    this.tweens.add({targets:flash,scale:3,alpha:0,duration:200,onComplete:()=>flash.destroy()});
  }

  /* ========= CINEMATIC ========= */

  ultimateCutscene(){

    this.sound.play("voice");
    this.bgm.stop();

    this.bgmUlt = this.sound.add("bgm_ult",{loop:true});
    this.bgmUlt.play();

    // barras negras
    const w=this.scale.width;
    this.topBar=this.add.rectangle(0,-100,w,100,0x000).setOrigin(0);
    this.botBar=this.add.rectangle(0,this.scale.height,w,100,0x000).setOrigin(0);

    this.tweens.add({targets:this.topBar,y:0,duration:200});
    this.tweens.add({targets:this.botBar,y:this.scale.height-100,duration:200});

    // portrait
    const p=this.add.image(-200,300,"portrait").setScale(0.5);
    this.tweens.add({targets:p,x:200,duration:300});

    // zoom
    this.cameras.main.zoomTo(1.5,300);

    this.time.delayedCall(600,()=>{

      this.cameras.main.shake(300,0.05);
      this.animeImpact(this.enemy.x,this.enemy.y);

      const flash=this.add.rectangle(400,300,2000,2000,0xffffff,1);
      this.tweens.add({targets:flash,alpha:0,duration:200,onComplete:()=>flash.destroy()});

    });

    this.time.delayedCall(1400,()=>{

      this.cameras.main.zoomTo(1,300);
      this.bgmUlt.stop();
      this.bgm.play();

      this.topBar.destroy();
      this.botBar.destroy();
      p.destroy();

    });
  }

}

/* ========= INIT ========= */

new Phaser.Game({
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  scene: GameScene
});
</script>

</body>
</html>
